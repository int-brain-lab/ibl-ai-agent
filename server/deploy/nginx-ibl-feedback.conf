# nginx reverse proxy for the IBL feedback server.
# Install to /etc/nginx/sites-available/ibl-feedback, symlink into
# sites-enabled, then run certbot to add TLS:
#   sudo ln -s /etc/nginx/sites-available/ibl-feedback /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d feedback.example.org
server {
    listen 80;
    server_name feedback.example.org;

    # Must be >= the client's MAX_PAYLOAD_BYTES (30 MB).
    client_max_body_size 30m;

    location /static/ {
        alias /opt/ibl-feedback-server/server/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
